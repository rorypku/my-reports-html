<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Reports</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fa;
      --panel: #ffffff;
      --text: #17202a;
      --muted: #667085;
      --line: #d9dee7;
      --accent: #1d6f8f;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    main {
      width: 100%;
      box-sizing: border-box;
      max-width: 880px;
      margin: 0 auto;
      padding: 56px 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 28px;
      color: var(--muted);
      line-height: 1.55;
    }

    .request {
      display: flex;
      gap: 10px;
      align-items: center;
      margin: 28px 0 36px;
    }

    .request input {
      min-width: 0;
      flex: 1;
      min-height: 46px;
      box-sizing: border-box;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 14px;
      background: var(--panel);
      color: var(--text);
      font: inherit;
      line-height: 1.3;
      appearance: none;
    }

    .request input:focus {
      border-color: var(--accent);
      outline: none;
    }

    .request button {
      min-height: 46px;
      box-sizing: border-box;
      border: 1px solid var(--accent);
      border-radius: 8px;
      padding: 10px 18px;
      background: var(--accent);
      color: #ffffff;
      font: inherit;
      font-weight: 650;
      line-height: 1.3;
      cursor: pointer;
      white-space: nowrap;
    }

    .request button:focus,
    .request button:hover {
      background: #185e79;
      outline: none;
    }

    @media (max-width: 560px) {
      .request {
        align-items: stretch;
        flex-direction: column;
        gap: 12px;
      }

      .request input,
      .request button {
        min-height: 54px;
        width: 100%;
      }
    }

    .date-group {
      margin-top: 18px;
      border-top: 1px solid var(--line);
      padding-top: 18px;
    }

    .date-group:first-of-type {
      margin-top: 36px;
    }

    summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin: 0 0 12px;
      font-size: 15px;
      color: var(--muted);
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      cursor: pointer;
      list-style: none;
    }

    summary::-webkit-details-marker {
      display: none;
    }

    summary::before {
      content: "";
      width: 8px;
      height: 8px;
      border-right: 2px solid var(--muted);
      border-bottom: 2px solid var(--muted);
      transform: rotate(-45deg);
      transition: transform 140ms ease;
      flex: 0 0 auto;
    }

    details[open] summary::before {
      transform: rotate(45deg);
    }

    .date-label {
      margin-right: auto;
    }

    .report-count {
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
      text-transform: none;
      letter-spacing: 0;
    }

    .reports {
      display: grid;
      gap: 12px;
    }

    a.report {
      display: block;
      padding: 18px 20px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: inherit;
      text-decoration: none;
    }

    a.report:hover,
    a.report:focus {
      border-color: var(--accent);
      outline: none;
    }

    .title {
      display: block;
      margin-bottom: 4px;
      font-size: 18px;
      font-weight: 650;
    }

    .path {
      color: var(--muted);
      font-size: 14px;
    }

    .empty {
      margin-top: 36px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main>
    <h1>My Reports</h1>
    <p>Published HTML situation reports.</p>

    <form class="request" id="request-form">
      <input
        id="request-query"
        name="query"
        type="text"
        inputmode="search"
        autocomplete="off"
        placeholder="amazon"
        aria-label="Report request"
        required
      >
      <button type="submit">Request report</button>
    </form>

    <div id="reports" aria-live="polite"></div>
  </main>
  <script>
    const reportsRoot = document.getElementById("reports");
    const requestForm = document.getElementById("request-form");
    const requestQuery = document.getElementById("request-query");
    const issuesUrl = "https://github.com/rorypku/my-reports-requests/issues/new";

    function escapeText(value) {
      return String(value).replace(/[&<>"']/g, (character) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;",
      }[character]));
    }

    function groupReports(reports) {
      return reports.reduce((groups, report) => {
        if (!groups.has(report.date)) {
          groups.set(report.date, []);
        }
        groups.get(report.date).push(report);
        return groups;
      }, new Map());
    }

    function renderReports(reports) {
      if (reports.length === 0) {
        reportsRoot.innerHTML = '<p class="empty">No published reports yet.</p>';
        return;
      }

      const groups = groupReports(reports);
      reportsRoot.innerHTML = Array.from(groups.entries()).map(([date, dateReports], index) => {
        const links = dateReports.map((report) => `
        <a class="report" href="${escapeText(report.url)}">
        <span class="title">${escapeText(report.title)}</span>
        <span class="path">${escapeText(report.path)}</span>
        </a>`).join("");

        return `    <details class="date-group"${index === 0 ? " open" : ""}>
      <summary>
        <span class="date-label">${escapeText(date)}</span>
        <span class="report-count">${dateReports.length} reports</span>
      </summary>
      <div class="reports">
${links}
      </div>
    </details>`;
      }).join("\n\n");
    }

    async function loadReports() {
      const response = await fetch("./reports.json", { cache: "no-store" });
      if (!response.ok) {
        throw new Error(`Failed to load reports.json: ${response.status}`);
      }
      renderReports(await response.json());
    }

    requestForm.addEventListener("submit", (event) => {
      event.preventDefault();

      const query = requestQuery.value.trim().replace(/\s+/g, " ");
      if (!query) {
        requestQuery.focus();
        return;
      }

      const parameters = new URLSearchParams({
        title: `report request: ${query}`,
        body: query,
      });

      window.location.href = `${issuesUrl}?${parameters.toString()}`;
    });

    loadReports();
  </script>
</body>
</html>
